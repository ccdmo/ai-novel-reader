<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天赋差？我一块钱买一年修为！</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; }
    .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 1.5rem 1rem; }
    .header h1 { font-size: 1.5rem; }
    .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    .chapter-list { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .chapter { padding: 1rem 1.2rem; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
    .chapter:hover { background: #f8f6ff; }
    .chapter-num { color: #667eea; font-weight: 600; font-size: 0.85rem; }
    .chapter-title { margin-top: 0.3rem; font-size: 1rem; }
    .back-btn { display: inline-block; margin-bottom: 1rem; color: #667eea; text-decoration: none; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="header">
    <div class="container">
      <a href="../" class="back-btn">← 返回书库</a>
      <h1>📖 天赋差？我一块钱买一年修为！</h1>
      <div class="meta">都市高武 · AI 仿写版 · 第1章已生成</div>
    </div>
  </div>
  <div class="container">
    <div id="chapterList"></div>
  </div>
  <script>
    async function loadChapters() {
      try {
        const res = await fetch(`../tianfu-cha/chapters.json`);
        const chapters = await res.json();
        document.getElementById('chapterList').innerHTML = chapters.map((ch, i) => `
          <div class="chapter" onclick="location.href='?book=tianfu-cha&chapter='+i">
            <div class="chapter-num">第${ch.num}章</div>
            <div class="chapter-title">${ch.title}</div>
          </div>
        `).join('');
      } catch(e) { document.getElementById('chapterList').innerHTML = '<div style="padding:2rem;text-align:center;color:#999">加载中...</div>'; }
    }
    loadChapters();
  </script>
</body>
</html>
