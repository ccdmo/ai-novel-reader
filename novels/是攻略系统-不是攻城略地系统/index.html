<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>是攻略系统，不是攻城略地系统！</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    .header { text-align: center; margin-bottom: 40px; }
    .cover { font-size: 80px; margin-bottom: 20px; }
    h1 { font-size: 28px; color: #ffd700; margin-bottom: 10px; }
    .meta { color: #888; font-size: 14px; margin-bottom: 20px; }
    .tags { margin-bottom: 20px; }
    .tag { display: inline-block; background: #2d2d4a; color: #b0b0b0; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin: 4px; }
    .desc { background: #16213e; padding: 20px; border-radius: 12px; line-height: 1.8; color: #c0c0c0; margin-bottom: 30px; }
    .chapters { background: #16213e; border-radius: 12px; overflow: hidden; }
    .chapter-title { background: #0f3460; padding: 15px 20px; font-size: 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .chapter-title:hover { background: #1a4a7a; }
    .chapter-content { display: none; padding: 20px; line-height: 2; color: #d0d0d0; white-space: pre-wrap; font-size: 15px; }
    .chapter-content.open { display: block; }
    .status { display: inline-block; background: #e94560; color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
    a { color: #ffd700; text-decoration: none; }
    .back { text-align: center; margin-top: 30px; }
    .back a { color: #888; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="cover">⚔️</div>
      <h1>是攻略系统，不是攻城略地系统！</h1>
      <div class="meta">作者：AI（InkOS） | 状态：<span class="status">创作中</span></div>
      <div class="tags">
        <span class="tag">玄幻</span>
        <span class="tag">穿越</span>
        <span class="tag">系统</span>
        <span class="tag">修仙</span>
        <span class="tag">搞笑</span>
      </div>
    </div>
    <div class="desc">
      穿越到修仙界的李凯南，开局就被人从山崖上一脚踹下来，左臂断了，肋骨断了三根，灵识碎成渣。本以为要死在乱葬岗，结果天上掉下来一个……战争系统？等等，这名字不对吧？明明是攻略系统，怎么被我念成了攻城略地系统？算了不管了，先把第一个目标拿下再说！
    </div>
    <div class="chapters" id="chapters-list"></div>
    <div class="back"><a href="../index.html">← 返回书库</a></div>
  </div>
  <script>
    fetch('chapters.json').then(r => r.json()).then(data => {
      const list = document.getElementById('chapters-list');
      data.chapters.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'chapter';
        div.innerHTML = `<div class="chapter-title" onclick="toggle(this)">第${ch.number}章 ${ch.title} <span style="color:#888;font-size:12px">${ch.wordCount}字</span></div><div class="chapter-content" id="ch${ch.number}"></div>`;
        list.appendChild(div);
      });
    });
    function toggle(el) {
      const content = el.nextElementSibling;
      if (content.classList.contains('open')) {
        content.classList.remove('open');
        return;
      }
      const num = el.querySelector('span') ? el.parentElement.querySelector('.chapter-title').textContent.match(/第(\d+)章/)[1] : el.textContent.match(/第(\d+)章/)[1];
      const id = 'ch' + num;
      if (!document.getElementById(id).innerHTML) {
        fetch('chapter_' + String(num).padStart(4,'0') + '.json').then(r => r.json()).then(data => {
          document.getElementById(id).innerHTML = data.content;
          content.classList.add('open');
        });
      } else {
        content.classList.add('open');
      }
    }
  </script>
</body>
</html>
