var CHAPTERS = {"book_id": "well-dragon", "chapters": [{"id": 1, "title": "第一章 亲妈举报，亲儿子被上交国家", "content": "“井里真的有怪物！我亲眼看见的！”\n\n一个中气十足的妇人声音从井口传下来，震得井底的水面都泛起涟漪。\n\n敖渊猛地睁开眼睛，入目是一片幽暗的井壁，苔藓斑驳，水质浑浊。他下意识想要动弹，却发现身体被一股黏稠的液体包裹着——那是井水，冰凉刺骨，正以一种诡异的方式滋养着他的每一寸肌肤。\n\n“系统检测到宿主苏醒，井龙王传承系统正在激活……”\n\n一道冰冷的机械音在他脑海中响起。\n\n敖渊愣住了。\n\n他记得自己明明是个996的程序员，加班到凌晨三点猝死在工位上，怎么一睁眼就到井底了？还听到他妈的声音？\n\n等等——系统？井龙王传承？\n\n“恭喜宿主成功转生为井龙王！”机械音变得欢快起来，“您现在所在的坐标是：华国青河省平安县向阳乡大柳树村李家老井。根据您目前的形态，建议您先适应一下……呃，龙身。”\n\n敖渊低头看去。\n\n只见自己的双手已经不复存在，取而代之的是一对泛着青光的龙爪，布满鳞片，锋利如刀。再看身躯，一条蜿蜒的龙尾正浸泡在井水中，尾部隐约闪烁着水纹。\n\n“……我他妈转生成了一条井里的龙？”\n\n敖渊差点一口井水喷出来。\n\n“宿主请注意文明用语，”系统适时提醒，“您现在是堂堂井龙王，要有格局。”\n\n格局？格局个屁！他连自己怎么死的都没搞清楚，就从程序员变成了神话传说中的井龙王，这剧本谁写的？出来挨打！\n\n“井里真的有怪物！我亲眼看见的！这事儿我得举报！”\n\n李秀芳的声音再次从井口传来，语气斩钉截铁，“我家这口井少说也有几十年了，从来没出过事儿，结果昨天我打水的时候，看见水面下头有个黑影子在动！又大又长，像条……像条蛇似的！”\n\n敖渊浑身一震。\n\n这个声音……是他的亲妈李秀芳没错！\n\n他在井底清晰地听到了井口上方的对话——李秀芳正在和村里的治保主任说话，旁边似乎还有几个看热闹的村民。\n\n“秀芳嫂子，你可想清楚了，举报假消息是要被批评教育的。”治保主任老王的声音听起来有些为难。\n\n“假消息？我李秀芳什么时候说过假消息！”李秀芳的声音拔高了八度，“老王你这话说的，我骗你干嘛？我堂堂一个村民，觉悟有那么低吗？这明明就是见义勇为的行为，是应该被表扬的！”\n\n敖渊在井底听得目瞪口呆。\n\n等等，亲妈……你在说什么？你在举报什么？\n\n“系统，”敖渊艰难地开口，“你能告诉我，上面那个女人是谁吗？”\n\n“正在扫描目标信息……”系统顿了顿，“扫描完成。目标人物：李秀芳，女，47岁，华国公民，身份证号……家庭住址：大柳树村一组27号。根据系统数据显示，此人是宿主在原世界的亲生母亲。”\n\n敖渊：“？？？”\n\n他转生成了井龙王，结果亲妈也跟着来了？还是说……这个李秀芳就是他前世的那个妈？\n\n他努力回忆前世的事情。记忆中，李秀芳确实是个典型的农村妇女——精明、节俭、贪小便宜，但总体来说是个刀子嘴豆腐心的好人。当年他996猝死的时候，好像就是他妈打电话来没人接，才发现了他的尸体。\n\n“秀芳嫂子，那你说说，你举报这事儿……是有什么想法吗？”老王的声音意味深长。\n\n“想法？”李秀芳理直气壮，“我想法很简单啊！前两天我在电视上看到新闻，说现在鼓励群众举报各种违法犯罪行为，还有奖励呢！像我们这种提供有效线索的，最低都有两百块！”\n\n敖渊在井底听得清清楚楚，一口老血差点喷出来。\n\n两百块。\n\n他妈为了两百块，要把他这个亲儿子当成“井中怪物”举报了。\n\n“系统，我再问你一遍。”敖渊的声音都在发抖，“上面那个女人，真的是我妈？”\n\n“根据DNA比对，是的。”\n\n“你确定？”\n\n“系统检测不存在误差。”\n\n“好，很好。”敖渊深吸一口气，“那她知道井里的是她儿子吗？”\n\n“不知道。宿主目前的形态是井龙王，与人类形态存在巨大差异。根据遗传学原理，母子之间不存在物种生殖隔离，但您现在是龙，她是人类，所以从生物学角度来说……”\n\n“你给我闭嘴！”\n\n敖渊只觉得眼前一黑。\n\n他，敖渊，前世是个985毕业的高材生，进入社会后沦为996的社畜，结果加班猝死转生成了一条井龙王。亲妈不仅没认出来他，还为了两百块钱奖金要举报他。\n\n这人生……还有比这更离谱的吗？\n\n“有。”\n\n系统的声音冷不丁响起。\n\n“根据宿主前世的命格分析，您这辈子转生成井龙王的主要原因，是上辈子攒的人品太差。具体表现为：连续三年没有给家里打过超过十分钟的电话；过年回家宁愿在公司加班也不愿意陪父母吃饭；以及……”\n\n“打住打住！”敖渊连忙叫停，“你是系统还是班主任？怎么还搞批斗会？”\n\n“系统只是在陈述事实。”机械音毫无感情波动，“另外提醒宿主，您目前所在的井已经被标记为'待清理'状态。如果相关人员确认井中存在'怪物'，可能会采取消毒、填埋等措施。”\n\n敖渊：“……填埋？”\n\n“简单来说，就是把井填上。”\n\n敖渊低头看了看自己的龙爪，又看了看头顶那口井口。\n\n如果井被填了……他岂不是要被活埋？\n\n“宿主不必担心，”系统像是读懂了他的心思，“作为井龙王，您可以在井水干涸的情况下存活长达三年。但如果您不想体验被活埋的感觉，建议您想办法提升实力，尽快解锁'迁井'能力。”\n\n“怎么提升实力？”\n\n“很简单。”系统的语气忽然变得蛊惑起来，“宿主您现在的职责是管理井水、庇护井底生灵。每管辖一口井，您就能获得修为、功德和龙族血脉。管的井越多，实力越强！”\n\n说着，一道半透明的光幕在敖渊眼前展开：\n\n【井龙王传承系统】\n\n【宿主：敖渊】\n\n【身份：井龙王（初级）】\n\n【修为：0】\n\n【功德：0】\n\n【龙族血脉浓度：3%】\n\n【已管辖井数：1/∞】\n\n【当前任务：暂无】\n\n【新手礼包：已发放，是否领取？】\n\n敖渊愣了一下。\n\n新手礼包？刚转生就有新手礼包，这系统还挺人性化。\n\n“领取。”\n\n“恭喜宿主获得：初级控水术×1，龙息入门×1，井龙王传承玉简×1。是否查看详细说明？”\n\n“查看。”\n\n【初级控水术】：可操控半径10米范围内的水体，威力随修为提升而增强。\n\n【龙息入门】：可喷吐带有龙族威压的气息，对低等生物有震慑效果。\n\n【井龙王传承玉简】：内含上古井龙王的修炼心得，使用后可大幅提升修炼效率。\n\n敖渊眼睛一亮。\n\n有系统有金手指，这就稳了！虽然转生成井龙王这件事本身就够离谱的，但好歹有变强的机会不是？\n\n他正想着怎么适应这具新身体，忽然听到井口传来一阵骚动。\n\n“秀芳嫂子，你确定那东西还在里头？”\n\n“在，肯定在！我昨天还看见了！”\n\n“那咱们咋办？要不要找人来抽水？”\n\n“抽什么水？多浪费！我看直接往里头倒点石灰得了，省事儿！”\n\n敖渊：“……”\n\n倒石灰？他这是造了什么孽，亲妈要拿石灰呛他？\n\n“系统，”敖渊连忙问，“如果井里倒了石灰，对我有什么影响？”\n\n“石灰属于碱性物质，会对井水造成污染。”系统如实回答，“以宿主目前的身体强度，大约能承受三到五次石灰攻击而不产生明显不适。但考虑到井底空间封闭，建议宿主提前做好应对措施。”\n\n三到五次？\n\n意思是他最多只能挨三到五次石灰，之后就会很难受？\n\n“秀芳，别冲动！”老王的声音传来，“这事儿得报给上面，让专业的人来处理！”\n\n“报给上面？那能有多少奖金？”\n\n“……这我不知道，但至少得先把情况核实清楚吧？”\n\n“核实？那要核实多久？我可跟你们说，这怪物在井里待一天，我的井就废一天！你们不着急我着急！”\n\n敖渊在井底听得五味杂陈。\n\n他的亲妈，一心只想着两百块钱奖金，恨不得现在就把他弄死。而他这个亲儿子，只能躲在井底听着，连喊一声“妈我在这儿”的资格都没有。\n\n这荒诞的现实，比他前世看过的所有烂片都离谱。\n\n就在他感慨命运多舛的时候，井口忽然传来新的动静。\n\n“对了秀芳，你那井里的怪物，长啥样？你看清了没？”\n\n“看清了！又长又粗，黑不溜秋的，还反光呢！”李秀芳斩钉截铁，“就跟电视里放的蛇似的，但是比蛇大！我估摸着，少说也有个两三米长！”\n\n敖渊低头看了看自己的龙身。\n\n他现在确实有两三米长，浑身覆盖着青色的鳞片，在水底下确实黑不溜秋的还反光……\n\n得，亲妈的描述还挺准确。\n\n“这么邪乎？”\n\n“那可不！我活了四十多年，从来没见过那种东西！”李秀芳越说越起劲，“我跟你们讲，当时我看见那玩意儿在水里游，差点没吓死！还好我反应快，扭头就跑，不然指不定被它缠上呢！”\n\n“老天爷……”有人倒吸一口凉气，“秀芳嫂子，你这也太危险了！”\n\n“可不是嘛！所以我才要举报啊！这明显就是个安全隐患，必须得处理掉！”\n\n敖渊已经彻底无语了。\n\n他这个儿子，在亲妈眼里就是个“安全隐患”，必须“处理掉”。\n\n行吧。\n\n既然如此，那就别怪他不客气了。\n\n“系统，”敖渊开口问道，“如果我使用龙息，会不会吓到上面那些人？”\n\n“以宿主目前的血脉浓度，龙息的范围大约在三米左右。但考虑到龙息带有龙族威压，对普通人可能会造成短暂的精神冲击。轻则头晕目眩，重则昏迷不醒。”\n\n敖渊点点头。\n\n吓人是不敢吓人的，万一把他妈吓出个好歹来，他可担不起这个责任。\n\n但是……吓一吓那些看热闹的村民总行吧？让他们知道这井里有东西，不敢轻举妄动，给他争取点时间。\n\n正当他准备试试龙息的威力时，井口上方忽然传来一阵引擎声。\n\n“诶？那是啥车？看着挺气派啊！”\n\n“卧槽，绿色的越野，军牌！这车可不多见！”\n\n“你们看，车上下来人了！穿着制服，像是……公家的人？”\n\n敖渊心中一动。\n\n公家的人？什么公家的人会来这种偏远农村？\n\n“系统，你能扫描到井口的情况吗？”\n\n“可以。但需要宿主授权一部分感知权限。”\n\n“授权。”\n\n下一秒，敖渊感觉自己和井口之间仿佛多了一条无形的纽带。他“看见”了井口上方的一切——\n\n几个穿着制服的年轻人正从那辆军用越野车上下来。他们身穿统一的深蓝色制服，左臂上绣着一个奇怪的标志：一只眼睛，下方是三条波纹。\n\n最前面那个人手里拿着一个仪器，正在对着井口扫描。\n\n“就是这里？”领头的那个人问。\n\n“对，就是这口井。”老王点头哈腰，“李秀芳同志今早举报的，说井里有不明生物。”\n\n“不明生物……”领头那人低头看了看仪器，嘴角微微抽搐，“目标体型：三米左右，疑似爬行类生物，生命特征异常……等等，这数据……”\n\n他猛地抬头，看向李秀芳。\n\n“大姐，你确定你看见的是活的？”\n\n“活的呀！”李秀芳拍着胸脯，“我可没瞎说！就在水里游来游去的，吓得我差点掉进去！”\n\n领头那人沉默了几秒，转头对身后的人说：\n\n“通知局里，这边发现的是……未知生物。具体是什么等我们下去看看再说。”\n\n“是！”\n\n几个人立刻开始忙碌起来，有的架设设备，有的往井口放置什么东西。\n\n敖渊在井底看着这一切，心里咯噔一下。\n\n国家超自然事物管理局——他没记错的话，这应该就是那个专门处理各种灵异事件的部门。前世的时候，他只在网上看到过一些都市传说，没想到这辈子居然真的遇上了。\n\n而且，还是被他亲妈举报之后遇上的。\n\n“宿主，”系统的声音响起，“检测到外部势力接近，是否开启防御模式？”\n\n“防御模式有什么功能？”\n\n“可以操控井水形成护盾，阻挡外来入侵者。但以宿主目前的修为，护盾最多维持三十秒。”\n\n三十秒……够干什么的？\n\n“不开启。”敖渊想了想，“先看看情况。”\n\n他转生成为井龙王，还没来得及搞清楚这个世界的规则。如果贸然和官方势力对抗，后果不堪设想。\n\n而且，他隐约觉得，事情可能没那么简单。\n\n“系统，这个超自然事物管理局，你知道多少？”\n\n“权限不足，无法访问相关信息。”系统回答，“但根据宿主前世的记忆碎片分析，这个部门在最近几年非常活跃。他们处理的案件包括但不限于：鬼魂驱除、妖兽捕捉、法器回收……”\n\n顿了顿，系统补充道：\n\n“其中，妖兽捕捉的案例占到了百分之三十七。”\n\n敖渊沉默了。\n\n所以……他这个“井龙王”，在官方眼里，就是一只需要被“捕捉”的妖兽？\n\n正想着，井口忽然传来一阵声响。\n\n“准备下放探测器！”\n\n“深度多少？”\n\n“二十三米左右。水质……浑浊，有轻微污染。”\n\n敖渊忽然有些紧张。\n\n他不知道自己该怎么做。是藏起来？还是现身？或者干脆跑路？\n\n可他又能跑到哪里去呢？他现在就是一条井里的龙，离了井水就活不了。\n\n就在他纠结的时候，一道声音忽然从井口传来。\n\n是个年轻女人的声音，语气冷淡，却带着一丝不易察觉的……好奇？\n\n“这口井的历史我查过了，至少有三百年。”女人说，“三百年的老井，通常会孕育一些有趣的东西。”\n\n“陈队，您觉得井里会是什么？”\n\n“不确定。”被称作陈队的女人说，“但从能量波动来看，不像是普通的蛇虫鼠蚁。”\n\n她低头看了看手中的仪器，忽然笑了。\n\n“倒是有几分龙气。”\n\n敖渊心头一震。\n\n龙气？这女人能感觉到他身上的龙气？\n\n“陈队，您是说……”旁边的人明显紧张起来。\n\n“我是说，”陈队收起笑容，“做好万全准备。这东西，可能不简单。”\n\n说完，她从腰间抽出一把泛着寒光的短刀，刀身上刻满了密密麻麻的符文。\n\n敖渊在井底看着这一幕，浑身鳞片都竖了起来。\n\n完了。\n\n他妈不仅把他举报了，还招来了这种级别的狠人。\n\n这下子，他是真的要被“处理”掉了。\n\n“系统，”敖渊的声音有些干涩，“有没有什么办法……让我不那么像妖兽？”\n\n“有的。”系统回答，“宿主可以尝试释放龙威。龙威是龙族特有的气息，对人类有一定的震慑作用。如果释放得当，可以让他们意识到您是有智慧的存在，而非普通妖兽。”\n\n“怎么做？”\n\n“集中精神，想象自己是高高在上的龙族之主。然后……”\n\n系统的声音忽然停住了。\n\n因为敖渊已经开始尝试了。\n\n他闭上眼睛，努力回忆前世看过的那些玄幻小说里描写龙威的片段。什么“君临天下”、什么“万物臣服”、什么“不可一世”……\n\n然后，他张开嘴——\n\n“噗。”\n\n一小团青色的气息从龙嘴里喷出，在水中散开。\n\n井口上方，陈队忽然停住脚步。\n\n她身后的队员们也跟着愣住。\n\n“陈队，怎么了？”\n\n陈队没有回答。她闭上眼睛，深吸一口气，像是在感受什么。\n\n几秒后，她睁开眼，看向那口井的目光变得复杂起来。\n\n“有趣……”她喃喃道，“居然真的成精了。”\n\n敖渊在井底也愣住了。\n\n成精？\n\n他这是……成功释放龙威了？\n\n“恭喜宿主，”系统的声音适时响起，“您的龙威释放成功，对井口上方的人类造成了一定程度的震慑效果。对方暂时停止了进攻。”\n\n敖渊松了口气。\n\n但紧接着，他就听到井口传来陈队的声音。\n\n“既然是有灵智的，那就好办了。”\n\n她的声音带着一丝玩味：\n\n“传我命令，封锁现场。我要下去……和它谈谈。”\n\n敖渊：“？？？”\n\n谈谈？\n\n她要和一条井里的龙……谈谈？\n\n他忽然有一种不祥的预感。\n\n这场“母子大战”的闹剧，似乎才刚刚开始……\n\n而另一边，李秀芳还站在井口，满脸期待地问老王：\n\n“老王，那个奖金的事……”\n\n“秀芳嫂子，您先别急，等他们处理完再说。”\n\n“那得等多久啊？我下午还得去镇上赶集呢！”\n\n老王嘴角抽了抽，默默地往旁边挪了两步。\n\n他活了五十多年，还是头一回见到有人举报自己家井里的“怪物”举报得这么积极的。\n\n井底，敖渊的龙眼紧紧盯着正在缓缓下放的探测设备。\n\n一场荒诞的“人龙谈判”，即将上演。\n\n（第一章完）"}]};
