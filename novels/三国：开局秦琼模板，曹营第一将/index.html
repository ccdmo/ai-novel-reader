<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>三国：开局秦琼模板，曹营第一将</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#333}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:1.5rem 1rem}
.header h1{font-size:1.5rem}
.meta{opacity:0.85;font-size:0.9rem;margin-top:0.3rem}
.container{max-width:800px;margin:2rem auto;padding:0 1rem}
.chapter-list{background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.chapter{padding:1rem 1.2rem;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .15s}
.chapter:hover{background:#f8f6ff}
.chapter-num{color:#667eea;font-weight:600;font-size:.85rem}
.chapter-title{margin-top:.3rem}
.back-btn{display:inline-block;margin-bottom:1rem;color:#667eea;text-decoration:none;font-size:.9rem}
.content-box{background:white;border-radius:12px;padding:2rem;margin-top:1rem;box-shadow:0 2px 8px rgba(0,0,0,.08);line-height:1.9;font-size:1.05rem;white-space:pre-wrap}
.chapter-nav{margin-top:1.5rem;padding-top:1rem;border-top:1px solid #eee;display:flex;justify-content:space-between}
.chapter-nav a{color:#667eea;text-decoration:none;font-size:.9rem}
</style>
</head>
<body>
<div class="header"><div class="container">
<a href="../" class="back-btn">← 返回书库</a>
<h1>📖 三国：开局秦琼模板，曹营第一将</h1>
<div class="meta">历史脑洞 · AI仿写版</div>
</div></div>
<div class="container" id="app"></div>
<script>
var BOOK_ID = "三国：开局秦琼模板，曹营第一将";
var CHAPTER_COUNT = 1;

function loadChapters() {
    var chapters = JSON.parse(document.getElementById("chapters-data").textContent);
    var html = "";
    for (var i = 0; i < chapters.length; i++) {
        html += '<div class="chapter" onclick="loadChapter(' + i + ')"><div class="chapter-num">第' + chapters[i].num + '章</div><div class="chapter-title">' + chapters[i].title + '</div></div>';
    }
    document.getElementById("app").innerHTML = html;
}

function loadChapter(idx) {
    var chapters = JSON.parse(document.getElementById("chapters-data").textContent);
    var chapterFile = "chapter_" + String(idx + 1).padStart(4, "0") + ".json";
    fetch(chapterFile).then(function(r) { return r.json(); }).then(function(data) {
        var prev = idx > 0 ? '<a href="javascript:loadChapter(' + (idx-1) + ')">← 上一章</a>' : '<span></span>';
        var next = idx < chapters.length - 1 ? '<a href="javascript:loadChapter(' + (idx+1) + ')">下一章 →</a>' : '<span></span>';
        document.getElementById("app").innerHTML =
            '<a href="javascript:loadChapters()" class="back-btn">← 返回目录</a>' +
            '<div class="content-box"><h2 style="margin-bottom:1.5rem">第' + data.num + '章 · ' + data.title + '</h2>' + data.content + '</div>' +
            '<div class="chapter-nav">' + prev + next + '</div>';
    });
}

// Auto-load chapter from URL param
var params = new URLSearchParams(location.search);
var c = params.get("c");
if (c !== null) {
    loadChapter(parseInt(c));
} else {
    loadChapters();
}
</script>
<script id="chapters-data" type="application/json">[{"num": 1, "title": "第一章", "status": "done", "words": 2578}]</script>
</body>
</html>
