<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首播青藏线救人，怎么惊动军方了</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; }
    .header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 1.5rem 1rem; }
    .header h1 { font-size: 1.5rem; }
    .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    .chapter-list { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .chapter { padding: 1rem 1.2rem; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
    .chapter:hover { background: #f8f6ff; }
    .chapter-num { color: #1a1a2e; font-weight: 600; font-size: 0.85rem; }
    .chapter-title { margin-top: 0.3rem; font-size: 1rem; }
    .completed-badge { display: inline-block; background: #e8f5e9; color: #2c5f2d; font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 10px; margin-left: 0.5rem; }
    .back-btn { display: inline-block; margin-bottom: 1rem; color: #667eea; text-decoration: none; font-size: 0.9rem; }
    .meta { font-size: 0.85rem; opacity: 0.9; margin-top: 0.3rem; }
  </style>
</head>
<body>
  <div class="header">
    <div class="container">
      <a href="../" class="back-btn" style="color:#fff">← 返回书库</a>
      <h1>📖 首播青藏线救人，怎么惊动军方了</h1>
      <div class="meta">都市脑洞 · AI仿写版 · <span class="completed-badge">第一章已完成</span></div>
    </div>
  </div>
  <div class="container">
    <div id="chapterList"></div>
  </div>
  <script>
    async function loadChapters() {
      try {
        const book = new URLSearchParams(location.search).get('book') || 'zangqing救人';
        const res = await fetch(`../${book}/chapters.json`);
        const chapters = await res.json();
        document.getElementById('chapterList').innerHTML = chapters.map((ch, i) => `
          <div class="chapter" onclick="location.href='?book=zangqing救人&chapter='+ch.num">
            <div class="chapter-num">第${ch.num}章</div>
            <div class="chapter-title">${ch.title} ${ch.status === 'completed' ? '<span class="completed-badge">已完成</span>' : '<span class="writing-badge">写作中</span>'}</div>
          </div>
        `).join('');
      } catch(e) { document.getElementById('chapterList').innerHTML = '<div style="padding:2rem;text-align:center;color:#999">章节加载中...</div>'; }
    }
    loadChapters();
  </script>
</body>
</html>
