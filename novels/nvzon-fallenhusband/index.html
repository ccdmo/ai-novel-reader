<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>女尊：开局沦为堕落人夫</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#333}
.header{background:linear-gradient(135deg,#8B5CF6,#EC4899);color:white;padding:1.5rem 1rem}
.header h1{font-size:1.5rem}
.meta{opacity:0.85;font-size:0.9rem;margin-top:0.3rem}
.container{max-width:800px;margin:2rem auto;padding:0 1rem}
.chapter-list{background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.chapter{padding:1rem 1.2rem;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .15s}
.chapter:hover{background:#f8f6ff}
.chapter-num{color:#8B5CF6;font-weight:600;font-size:.85rem}
.chapter-title{margin-top:.3rem}
.back-btn{display:inline-block;margin-bottom:1rem;color:#8B5CF6;text-decoration:none;font-size:.9rem}
.content-box{background:white;border-radius:12px;padding:2rem;margin-top:1rem;box-shadow:0 2px 8px rgba(0,0,0,.08);line-height:1.9;font-size:1.05rem;white-space:pre-wrap}
.chapter-nav{margin-top:1.5rem;padding-top:1rem;border-top:1px solid #eee;display:flex;justify-content:space-between}
.chapter-nav a{color:#8B5CF6;text-decoration:none;font-size:.9rem}
</style>
</head>
<body>
<div class="header"><div class="container">
<a href="../" class="back-btn">← 返回书库</a>
<h1>📖 女尊：开局沦为堕落人夫</h1>
<div class="meta">都市日常 · AI仿写版</div>
</div></div>
<div class="container" id="app"></div>
<script>
const CHAPTERS_URL="chapters.json";
const CHAPTER_PREFIX="chapter_";
async function loadChapters(){try{const r=await fetch(CHAPTERS_URL);const d=await r.json();const app=document.getElementById("app");if(window.location.hash){const n=parseInt(window.location.hash.slice(1));renderChapter(n,d);}else{renderList(d);}}catch(e){document.getElementById("app").innerHTML="<p>加载失败</p>";}}
function renderList(chapters){const app=document.getElementById("app");app.innerHTML=`<div class="chapter-list">${chapters.map(c=>`<div class="chapter" onclick="window.location.hash='${c.num}';window.scrollTo(0,0)"><div class="chapter-num">第${c.num}章</div><div class="chapter-title">${c.title}</div></div>`).join('')}</div>`;}
async function renderChapter(num,chapters){try{const r=await fetch(`${CHAPTER_PREFIX}${String(num).padStart(4,'0')}.json`);const d=await r.json();const app=document.getElementById("app");const prev=chapters.find(c=>c.num===num-1);const next=chapters.find(c=>c.num===num+1);app.innerHTML=`<div class="content-box"><h2>${d.title}</h2><br>${d.content.replace(/\n/g,'<br>')}</div><div class="chapter-nav">${prev?`<a href="#${prev.num}">← ${prev.title}</a>`:'<span></span>'}${next?`<a href="#${next.num}">${next.title} →</a>`:'<span></span>'}</div>`;}catch(e){document.getElementById("app").innerHTML="<p>加载章节失败</p>";}}
window.addEventListener("hashchange",()=>{fetch(CHAPTERS_URL).then(r=>r.json()).then(d=>renderChapter(parseInt(window.location.hash.slice(1)),d));});
loadChapters();
</script>
</body>
</html>
