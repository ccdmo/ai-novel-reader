<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 小说创意平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 2rem 1rem; }
    .header-content { max-width: 1200px; margin: 0 auto; }
    .header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .header p { opacity: 0.85; }
    .nav-tabs { max-width: 1200px; margin: 0 auto; background: white; display: flex; border-bottom: 2px solid #eee; padding: 0 1rem; }
    .tab-btn { background: none; border: none; padding: 1rem 1.5rem; cursor: pointer; font-size: 0.95rem; color: #666; border-bottom: 3px solid transparent; transition: all 0.2s; }
    .tab-btn.active { color: #667eea; border-bottom-color: #667eea; font-weight: 600; }
    .tab-btn:hover { color: #667eea; }
    .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
    
    /* Novel Grid */
    .novel-controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; align-items: end; }
    .control-block { display: flex; flex-direction: column; gap: 0.4rem; }
    .control-block label { font-size: 0.9rem; color: #555; }
    .control-block input, .control-block select { padding: 0.75rem 1rem; border: 1px solid #ddd; border-radius: 10px; font-size: 0.95rem; }
    .cover-batch-btn { background: #ff7f50; color: white; border: none; padding: 0.85rem 1rem; border-radius: 10px; cursor: pointer; font-size: 0.95rem; font-weight: 600; }
    .cover-batch-btn:hover { background: #f56b33; }
    .novel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
    .novel-card { position: relative; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.08); transition: transform .2s; cursor: pointer; }
    .novel-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
    .novel-cover { position: relative; width: 100%; height: 160px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; font-size: 3rem; overflow: hidden; border-radius: 16px; }
    .novel-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cover-edit-btn { position: absolute; top: 10px; right: 10px; z-index: 2; background: rgba(0,0,0,0.6); color: white; border: none; padding: 0.35rem 0.6rem; border-radius: 999px; cursor: pointer; font-size: 0.75rem; }
    .novel-info { padding: 1rem; }
    .novel-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; color: #333; }
    .novel-desc { font-size: 0.85rem; color: #888; line-height: 1.5; margin-bottom: 0.75rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .novel-meta { font-size: 0.75rem; color: #aaa; display: flex; justify-content: space-between; align-items: center; }
    .novel-actions { margin-top: 0.75rem; }
    .novel-actions .action-btn { background: #4CAF50; margin: 0; }
    .tag { display: inline-block; padding: 0.25rem 0.6rem; border-radius: 20px; font-size: 0.7rem; background: #e8f0fe; color: #4285f4; margin-right: 0.3rem; }
    .tag.writing { background: #fff3e0; color: #e65100; }
    .tag.drama { background: #f3e5f5; color: #7b1fa2; cursor: pointer; }
    .tag.drama:hover { opacity: 0.9; }
    .tag.genre { background: #e8eaf6; color: #3f51b5; }
    .novel-tags { margin-bottom: 0.5rem; min-height: 1.2rem; display: flex; flex-wrap: wrap; gap: 0.2rem; }
    .loading { text-align: center; padding: 3rem; color: #999; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; padding: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
    .modal.visible { opacity: 1; pointer-events: auto; }
    .modal-dialog { background: white; width: min(560px,100%); border-radius: 16px; overflow: hidden; box-shadow: 0 18px 60px rgba(0,0,0,.25); }
    .modal-header { padding: 1rem 1.25rem; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .modal-header h3 { margin: 0; font-size: 1.05rem; color: #222; }
    .modal-close { background: none; border: none; font-size: 1.5rem; line-height: 1; cursor: pointer; color: #666; }
    .modal-body { padding: 1.25rem; display: grid; gap: 1rem; }
    .modal-body .preview { width: 100%; height: 220px; border-radius: 14px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .modal-body .preview img { width: 100%; height: 100%; object-fit: cover; }
    .modal-body .preview::before { content: '当前封面预览'; position: absolute; top: 12px; left: 12px; font-size: 0.82rem; color: #555; background: rgba(255,255,255,0.92); padding: 0.2rem 0.45rem; border-radius: 999px; }
    .modal-body .modal-actions { display: flex; flex-wrap: wrap; gap: 0.75rem; }
    .modal-body .modal-actions button { flex: 1 1 140px; padding: 0.85rem 1rem; border: none; border-radius: 12px; font-size: 0.95rem; cursor: pointer; }
    .upload-btn { background: #4caf50; color: white; }
    .ai-btn { background: #667eea; color: white; }
    .modal-footer { padding: 1rem 1.25rem 1.5rem; display: flex; justify-content: flex-end; gap: 0.75rem; background: #fafafa; }
    .modal-footer button { padding: 0.8rem 1rem; border: none; border-radius: 10px; cursor: pointer; }
    .modal-footer .cancel-btn { background: #eee; color: #333; }
    @media(max-width:768px) {
      .nav-tabs { overflow-x: auto; }
      .tab-btn { padding: 1rem 1rem; font-size: 0.85rem; }
      .drama-table { font-size: 0.85rem; }
      .drama-table th, .drama-table td { padding: 0.75rem 0.5rem; }
      .modal-body .preview { height: 180px; }
    }
    
    /* Drama Factory */
    .drama-factory { background: white; padding: 2rem; border-radius: 12px; }
    .batch-control { display: flex; gap: 1rem; margin-bottom: 2rem; align-items: flex-end; }
    .batch-control input { padding: 0.6rem 1rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; }
    .batch-control button { background: #667eea; color: white; border: none; padding: 0.6rem 1.5rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
    .batch-control button:hover { background: #5568d3; }
    .batch-control button:disabled { background: #ccc; cursor: not-allowed; }
    
    .progress-container { margin-bottom: 2rem; }
    .progress-bar-wrapper { background: #eee; border-radius: 8px; height: 24px; overflow: hidden; margin-bottom: 0.5rem; }
    .progress-bar { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; width: 0%; transition: width 0.3s; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.7rem; font-weight: 600; }
    .progress-text { font-size: 0.85rem; color: #666; }
    
    .drama-table { width: 100%; border-collapse: collapse; margin-top: 2rem; }
    .drama-table th { background: #f5f5f5; padding: 1rem; text-align: left; font-weight: 600; border-bottom: 2px solid #eee; }
    .drama-table td { padding: 1rem; border-bottom: 1px solid #eee; }
    .drama-table tr:hover { background: #fafafa; }
    .status-badge { display: inline-block; padding: 0.3rem 0.8rem; border-radius: 16px; font-size: 0.75rem; font-weight: 600; }
    .status-pending { background: #fff3e0; color: #e65100; }
    .status-done { background: #e8f5e9; color: #2e7d32; }
    .status-error { background: #ffebee; color: #c62828; }
    .score { font-weight: 600; color: #667eea; }
    .action-btn { background: #667eea; color: white; border: none; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.75rem; margin: 0 0.25rem; }
    .action-btn:hover { background: #5568d3; }
    .action-btn.danger { background: #ef5350; }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    @media(max-width:768px) {
      .nav-tabs { overflow-x: auto; }
      .tab-btn { padding: 1rem 1rem; font-size: 0.85rem; }
      .drama-table { font-size: 0.85rem; }
      .drama-table th, .drama-table td { padding: 0.75rem 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-content">
      <h1>🎬 AI 小说创意平台</h1>
      <p>一站式小说创作、转换与审核服务</p>
    </div>
  </div>

  <div class="nav-tabs">
    <button class="tab-btn active" data-tab="novels">📚 小说库</button>
    <button class="tab-btn" data-tab="drama">🎬 短剧工厂</button>
    <button class="tab-btn" data-tab="audit">✅ 审核中心</button>
  </div>

  <div class="container">
    <!-- 小说库标签页 -->
    <div class="tab-content active" id="novels-tab">
      <div class="novel-controls">
        <div class="control-block">
          <label for="novelSearch">搜索小说</label>
          <input id="novelSearch" type="search" placeholder="输入书名、作者、简介或风格" oninput="handleSearchInput()">
        </div>
        <div class="control-block">
          <label for="novelGenre">筛选风格</label>
          <select id="novelGenre" onchange="handleGenreChange()">
            <option value="">全部风格</option>
          </select>
        </div>
        <div class="control-block">
          <label for="novelSort">排序方式</label>
          <select id="novelSort" onchange="handleSortChange()">
            <option value="title_asc">书名 A → Z</option>
            <option value="title_desc">书名 Z → A</option>
            <option value="heat_desc">热度 从高到低</option>
            <option value="heat_asc">热度 从低到高</option>
          </select>
        </div>
        <div class="control-block">
          <label>&nbsp;</label>
          <button class="cover-batch-btn" onclick="generateMissingCovers()">🖼️ 一键生成缺失封面</button>
        </div>
      </div>
      <div class="novel-grid" id="novelGrid"><div class="loading">加载中...</div></div>
    </div>

    <!-- 短剧工厂标签页 -->
    <div class="tab-content" id="drama-tab">
      <div class="drama-factory">
        <h2 style="margin-bottom: 1.5rem;">🎬 短剧工厂</h2>
        
        <div style="background: #f9f9f9; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; border: 1px solid #eee;">
          <h3 style="font-size: 0.95rem; margin-bottom: 1rem; color: #667eea;">⚙️ 配置 API 密钥</h3>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
            <div>
              <label style="font-size: 0.85rem; color: #666;">OpenAI API Key</label>
              <input type="password" id="openaiApiKey" placeholder="sk-..." style="width: 100%; padding: 0.6rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.85rem;" value="">
              <div style="font-size: 0.75rem; color: #999; margin-top: 0.3rem;">用于小说转剧本</div>
            </div>
            <div>
              <label style="font-size: 0.85rem; color: #666;">Anthropic API Key</label>
              <input type="password" id="anthropicApiKey" placeholder="sk-ant-..." style="width: 100%; padding: 0.6rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.85rem;" value="">
              <div style="font-size: 0.75rem; color: #999; margin-top: 0.3rem;">用于 AI 质量审核</div>
            </div>
          </div>
          <div style="display: flex; gap: 1rem; align-items: flex-end;">
            <div style="flex: 1;">
              <label style="font-size: 0.85rem; color: #666;">API 服务地址</label>
              <input type="text" id="apiEndpoint" placeholder="http://localhost:8000 或云端地址" style="width: 100%; padding: 0.6rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.85rem;">
            </div>
            <button onclick="saveApiConfig()" style="padding: 0.6rem 1rem; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem;">💾 保存配置</button>
            <button onclick="testApiConnection()" style="padding: 0.6rem 1rem; background: #17a2b8; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem;">🔗 测试连接</button>
          </div>
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
            <div style="display:flex; flex-direction:column; gap:0.5rem;">
              <label style="font-size: 0.85rem; color: #666;">转换提示词</label>
              <textarea id="conversionPrompt" placeholder="在这里填写短剧转换提示词，模型会根据此提示词生成剧本。" style="width:100%; min-height:140px; padding:0.8rem; border:1px solid #ddd; border-radius:8px; font-size:0.85rem; resize:vertical;"></textarea>
              <div style="display:flex; gap:0.5rem; align-items:center;">
                <button onclick="document.getElementById('conversionPromptFile').click()" style="padding:0.5rem 0.8rem; background:#f6ad55; color:white; border:none; border-radius:6px; cursor:pointer;">📄 导入转换提示词</button>
                <input type="file" id="conversionPromptFile" accept=".txt" style="display:none;" onchange="loadPromptFile(event, 'conversionPrompt')">
                <span style="font-size:0.75rem; color:#999;">支持TXT文件</span>
              </div>
            </div>
            <div style="display:flex; flex-direction:column; gap:0.5rem;">
              <label style="font-size: 0.85rem; color: #666;">审核评分规范提示词</label>
              <textarea id="reviewPrompt" placeholder="在这里填写审核规范或评分标准，模型会根据此提示词对剧本进行评分和建议。" style="width:100%; min-height:140px; padding:0.8rem; border:1px solid #ddd; border-radius:8px; font-size:0.85rem; resize:vertical;"></textarea>
              <div style="display:flex; gap:0.5rem; align-items:center;">
                <button onclick="document.getElementById('reviewPromptFile').click()" style="padding:0.5rem 0.8rem; background:#f6ad55; color:white; border:none; border-radius:6px; cursor:pointer;">📄 导入审核提示词</button>
                <input type="file" id="reviewPromptFile" accept=".txt" style="display:none;" onchange="loadPromptFile(event, 'reviewPrompt')">
                <span style="font-size:0.75rem; color:#999;">支持TXT文件</span>
              </div>
            </div>
          </div>
        </div>

        <div class="batch-control">
          <label>每批处理数量：</label>
          <input type="number" id="batchSize" min="1" max="20" value="5" placeholder="5">
          <button id="startBtn" onclick="startDramaConversion()">🚀 开始转换</button>
          <button id="pauseBtn" onclick="pauseConversion()" style="display:none;">⏸ 暂停</button>
        </div>

        <div class="progress-container">
          <div class="progress-bar-wrapper">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <div class="progress-text">
            <span id="progressText">已处理: 0/0</span>
            <span id="progressTime" style="float:right; color:#999;"></span>
          </div>
        </div>

        <table class="drama-table">
          <thead>
            <tr>
              <th style="width:25%;">小说名称</th>
              <th style="width:15%;">转换状态</th>
              <th style="width:10%;">质量评分</th>
              <th style="width:30%;">审核意见</th>
              <th style="width:20%;">操作</th>
            </tr>
          </thead>
          <tbody id="dramaTbody">
            <tr><td colspan="5" class="loading" style="padding: 2rem;">等待开始转换...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 审核中心标签页 -->
    <div class="tab-content" id="audit-tab">
      <div class="drama-factory">
        <h2 style="margin-bottom: 1.5rem;">✅ 审核中心</h2>
        
        <div style="margin-bottom: 1.5rem;">
          <label>筛选状态：</label>
          <select id="filterStatus" onchange="filterAuditTable()" style="padding:0.6rem; border:1px solid #ddd; border-radius:6px;">
            <option value="">全部</option>
            <option value="pending">待审核</option>
            <option value="approved">已批准</option>
            <option value="rejected">已拒绝</option>
            <option value="modified">已修改</option>
          </select>
        </div>

        <table class="drama-table">
          <thead>
            <tr>
              <th style="width:25%;">小说名称</th>
              <th style="width:12%;">质量评分</th>
              <th style="width:20%;">问题描述</th>
              <th style="width:15%;">审核状态</th>
              <th style="width:28%;">操作</th>
            </tr>
          </thead>
          <tbody id="auditTbody">
            <tr><td colspan="5" class="loading" style="padding: 2rem;">加载审核数据...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="coverModal" class="modal" onclick="closeCoverModal()">
    <div class="modal-dialog" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3>更换封面</h3>
        <button class="modal-close" onclick="closeCoverModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="preview" id="coverPreview"><span style="font-size: 2rem;">📖</span></div>
        <div id="coverPreviewText" style="color:#555; font-size:0.95rem;">请选择“上传封面”或“AI 生成封面”。</div>
        <div class="modal-actions">
          <label class="upload-btn" style="display:inline-flex; justify-content:center; align-items:center;">
            上传封面<input id="coverFileInput" type="file" accept="image/*" style="display:none;" onchange="uploadCoverFromInput(event)">
          </label>
          <button class="ai-btn" onclick="generateCoverForNovel()">AI 生成封面</button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="cancel-btn" onclick="closeCoverModal()">取消</button>
      </div>
    </div>
  </div>

  <script>
    const API_ENDPOINT = localStorage.getItem('apiEndpoint') || '';
    let isConverting = false;
    let novelList = [];
    let currentSearchTerm = '';
    let currentGenreFilter = '';
    let currentSortKey = 'title_asc';

    // 标签页切换
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', (event) => {
        const tab = btn.getAttribute('data-tab');
        switchTab(tab, event);
      });
    });

    function openDrama(novelId, event) {
      event.stopPropagation();
      location.href = 'novels/' + encodeURIComponent(novelId) + '/drama.html';
    }

    function switchTab(tabName, event) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      
      document.getElementById(tabName + '-tab').classList.add('active');
      event.target.classList.add('active');

      if (tabName === 'audit') loadAuditData();
    }

    function handleSearchInput() {
      currentSearchTerm = document.getElementById('novelSearch').value.trim().toLowerCase();
      renderNovelList();
    }

    function handleGenreChange() {
      currentGenreFilter = document.getElementById('novelGenre').value;
      renderNovelList();
    }

    function handleSortChange() {
      currentSortKey = document.getElementById('novelSort').value;
      renderNovelList();
    }

    function getGenreOptions() {
      const genreSet = new Set();
      novelList.forEach(novel => {
        if (!novel.genre) return;
        novel.genre.split('/').forEach(g => {
          const trimmed = g.trim();
          if (trimmed) genreSet.add(trimmed);
        });
      });
      return Array.from(genreSet).sort();
    }

    function updateGenreFilterOptions() {
      const genreSelect = document.getElementById('novelGenre');
      const genres = getGenreOptions();
      genreSelect.innerHTML = '<option value="">全部风格</option>' + genres.map(g => `<option value="${g}">${g}</option>`).join('');
      if (currentGenreFilter) genreSelect.value = currentGenreFilter;
    }

    function sortNovelList(list) {
      return list.slice().sort((a, b) => {
        const aHeat = Number.isFinite(a.heat) ? a.heat : 0;
        const bHeat = Number.isFinite(b.heat) ? b.heat : 0;
        const aTitle = (a.title || '').toLowerCase();
        const bTitle = (b.title || '').toLowerCase();

        switch (currentSortKey) {
          case 'title_desc':
            return bTitle.localeCompare(aTitle, 'zh-Hans-CN');
          case 'heat_asc':
            return aHeat - bHeat;
          case 'heat_desc':
            return bHeat - aHeat;
          default:
            return aTitle.localeCompare(bTitle, 'zh-Hans-CN');
        }
      });
    }

    function renderNovelList() {
      const grid = document.getElementById('novelGrid');
      if (!novelList || !novelList.length) {
        grid.innerHTML = '<div class="loading">暂无小说，稍后再来看看吧～</div>';
        return;
      }

      let filtered = novelList.filter(novel => {
        const title = (novel.title || '').toLowerCase();
        const desc = (novel.desc || '').toLowerCase();
        const author = (novel.author || '').toLowerCase();
        const genreText = (novel.genre || '').toLowerCase();
        const terms = [title, desc, author, genreText].join(' ');
        const matchSearch = currentSearchTerm ? terms.includes(currentSearchTerm) : true;
        const matchGenre = currentGenreFilter ? genreText.split('/').map(g => g.trim()).includes(currentGenreFilter) : true;
        return matchSearch && matchGenre;
      });

      if (!filtered.length) {
        grid.innerHTML = '<div class="loading">找不到符合条件的小说，请调整搜索或筛选条件。</div>';
        return;
      }

      filtered = sortNovelList(filtered);
      grid.innerHTML = filtered.map(novel => {
        const doneCount = (novel.chapters || []).filter(c => c.status === 'done').length;
        const totalCount = doneCount > 0 ? doneCount : (novel.chapters || []).length;
        const statusLabel = novel.status === 'writing' ? '<span class="tag writing">写作中</span>' : '';
        const genreTag = novel.genre ? `<span class="tag genre">${novel.genre}</span>` : '';
        const tagsHtml = [statusLabel, genreTag].filter(t => t).join('');
        const coverHtml = novel.cover && (novel.cover.startsWith('http://') || novel.cover.startsWith('https://') || novel.cover.startsWith('data:image') || novel.cover.startsWith('novels/'))
          ? `<img src="${novel.cover}" alt="${novel.title} 封面">`
          : (novel.cover || '📖');
        return `<div class="novel-card" onclick="location.href='novels/${encodeURIComponent(novel.id)}/'">
  <div class="novel-cover">${coverHtml}<button class="cover-edit-btn" onclick="openCoverModal('${encodeURIComponent(novel.id)}', event)">更换封面</button></div>
  <div class="novel-info">
    <div class="novel-title">${novel.title}</div>
    <div class="novel-tags">${tagsHtml}</div>
    <div class="novel-desc">${novel.desc}</div>
    <div class="novel-meta">
      <span>${totalCount > 0 ? '共 ' + totalCount + ' 章' : '待生成'}</span>
      <span>${Number.isFinite(novel.heat) ? `热度：${novel.heat}` : ''}</span>
    </div>
    <div class="novel-actions">
      <a href="novels/${encodeURIComponent(novel.id)}/drama.html" class="action-btn" onclick="event.stopPropagation()">短剧版</a>
    </div>
  </div>
</div>`;
      }).join('');
    }

    async function loadNovels() {
      try {
        const res = await fetch('novels/index.json');
        novelList = await res.json();
        if (!novelList || !novelList.length) {
          document.getElementById('novelGrid').innerHTML = '<div class="loading">暂无小说，稍后再来看看吧～</div>';
          return;
        }
        updateGenreFilterOptions();
        renderNovelList();
      } catch(e) {
        document.getElementById('novelGrid').innerHTML = '<div class="loading">加载失败</div>';
      }
    }

    // 开始短剧转换
    async function startDramaConversion() {
      const apiEndpoint = document.getElementById('apiEndpoint').value.trim();
      const openaiKey = document.getElementById('openaiApiKey').value.trim();
      const anthropicKey = document.getElementById('anthropicApiKey').value.trim();
      const conversionPrompt = document.getElementById('conversionPrompt').value.trim();
      const reviewPrompt = document.getElementById('reviewPrompt').value.trim();
      const batchSize = parseInt(document.getElementById('batchSize').value) || 5;
      
      if (!apiEndpoint) {
        alert('❌ 请先输入 API 服务地址');
        return;
      }
      
      if (!openaiKey) {
        alert('❌ 请输入 OpenAI API Key');
        return;
      }
      
      if (!anthropicKey) {
        alert('❌ 请输入 Anthropic API Key');
        return;
      }
      
      localStorage.setItem('apiEndpoint', apiEndpoint);
      localStorage.setItem('openaiApiKey', openaiKey);
      localStorage.setItem('anthropicApiKey', anthropicKey);
      localStorage.setItem('conversionPrompt', conversionPrompt);
      localStorage.setItem('reviewPrompt', reviewPrompt);
      
      isConverting = true;
      document.getElementById('startBtn').disabled = true;
      document.getElementById('pauseBtn').style.display = 'inline-block';
      document.getElementById('dramaTbody').innerHTML = '';

      const startTime = Date.now();
      for (let i = 0; i < Math.min(batchSize, novelList.length); i++) {
        if (!isConverting) break;
        
        const novel = novelList[i];
        await convertNovel(novel, apiEndpoint, openaiKey, anthropicKey, conversionPrompt, reviewPrompt, i, batchSize, startTime);
      }

      isConverting = false;
      document.getElementById('startBtn').disabled = false;
      document.getElementById('pauseBtn').style.display = 'none';
    }

    async function convertNovel(novel, apiEndpoint, openaiKey, anthropicKey, conversionPrompt, reviewPrompt, index, total, startTime) {
      const row = document.createElement('tr');
      row.id = 'novel-' + novel.id;
      row.innerHTML = `
        <td>${novel.title || novel.id}</td>
        <td><span class="status-badge status-pending">转换中...</span></td>
        <td>-</td>
        <td>正在处理...</td>
        <td><button class="action-btn" disabled>处理中</button></td>
      `;
      document.getElementById('dramaTbody').appendChild(row);

      try {
        const response = await fetch(`${apiEndpoint}/api/drama/convert`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            novel_id: novel.id,
            openai_api_key: openaiKey,
            anthropic_api_key: anthropicKey,
            conversion_prompt: conversionPrompt,
            review_prompt: reviewPrompt
          })
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.detail || `HTTP ${response.status}`);
        }
        
        const result = await response.json();
        
        row.innerHTML = `
          <td>${novel.title || novel.id}</td>
          <td><span class="status-badge status-done">已完成</span></td>
          <td><span class="score">${result.score || '--'}/100</span></td>
          <td>${(result.review_notes || '通过')}</td>
          <td>
            <a href="${result.script_url}" target="_blank" class="action-btn">查看</a>
            <button class="action-btn" onclick="approveNovel('${novel.id}')">✅ 批准</button>
          </td>
        `;
      } catch(e) {
        row.innerHTML = `
          <td>${novel.title || novel.id}</td>
          <td><span class="status-badge status-error">失败</span></td>
          <td>-</td>
          <td>${e.message}</td>
          <td><button class="action-btn danger" onclick="retryNovel('${novel.id}')">🔄 重试</button></td>
        `;
      }

      updateProgress(index + 1, total, startTime);
    }

    function updateProgress(current, total, startTime) {
      const percent = (current / total) * 100;
      document.getElementById('progressBar').style.width = percent + '%';
      document.getElementById('progressText').textContent = `已处理: ${current}/${total}`;
      
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const avgTime = elapsed / current;
      const remaining = ((total - current) * avgTime);
      document.getElementById('progressTime').textContent = `预计剩余: ${Math.floor(remaining)}s`;
    }

    function pauseConversion() {
      isConverting = false;
      document.getElementById('startBtn').disabled = false;
      document.getElementById('pauseBtn').style.display = 'none';
    }

    async function loadAuditData() {
      const tbody = document.getElementById('auditTbody');
      try {
        const response = await fetch(API_ENDPOINT + '/api/drama/audit-list');
        const dramas = await response.json();
        
        if (!dramas || dramas.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="loading">暂无审核数据</td></tr>';
          return;
        }

        tbody.innerHTML = dramas.map(drama => `
          <tr data-novel="${drama.novel_id}">
            <td>${drama.title}</td>
            <td><span class="score">${drama.score}/100</span></td>
            <td>${drama.issues || '-'}</td>
            <td><span class="status-badge status-${drama.status}">${drama.status_cn}</span></td>
            <td>
              <button class="action-btn" onclick="viewDrama('${drama.novel_id}')">查看</button>
              <button class="action-btn" onclick="approveDrama('${drama.novel_id}')">✅ 批准</button>
              <button class="action-btn danger" onclick="rejectDrama('${drama.novel_id}')">❌ 拒绝</button>
            </td>
          </tr>
        `).join('');
      } catch(e) {
        tbody.innerHTML = `<tr><td colspan="5" class="loading">加载失败: ${e.message}</td></tr>`;
      }
    }

    function filterAuditTable() {
      const status = document.getElementById('filterStatus').value;
      document.querySelectorAll('#auditTbody tr').forEach(row => {
        if (!status) {
          row.style.display = '';
        } else {
          const statusClass = 'status-' + status;
          row.style.display = row.innerHTML.includes(statusClass) ? '' : 'none';
        }
      });
    }

    function approveNovel(novelId) {
      alert('已批准: ' + novelId);
    }

    function retryNovel(novelId) {
      alert('重试: ' + novelId);
    }

    function viewDrama(novelId) {
      alert('查看: ' + novelId);
    }

    function approveDrama(novelId) {
      alert('批准: ' + novelId);
    }

    function rejectDrama(novelId) {
      alert('拒绝: ' + novelId);
    }

    // ========== API 配置管理 ==========
    function loadPromptFile(event, fieldId) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        document.getElementById(fieldId).value = reader.result;
      };
      reader.readAsText(file, 'utf-8');
    }

    function saveApiConfig() {
      const apiEndpoint = document.getElementById('apiEndpoint').value.trim();
      const openaiApiKey = document.getElementById('openaiApiKey').value.trim();
      const anthropicApiKey = document.getElementById('anthropicApiKey').value.trim();
      const conversionPrompt = document.getElementById('conversionPrompt').value.trim();
      const reviewPrompt = document.getElementById('reviewPrompt').value.trim();
      
      if (!apiEndpoint) {
        alert('❌ API 服务地址不能为空');
        return;
      }
      
      localStorage.setItem('apiEndpoint', apiEndpoint);
      localStorage.setItem('openaiApiKey', openaiApiKey);
      localStorage.setItem('anthropicApiKey', anthropicApiKey);
      localStorage.setItem('conversionPrompt', conversionPrompt);
      localStorage.setItem('reviewPrompt', reviewPrompt);
      
      alert('✅ 配置已保存！\n\n' +
            'API 地址: ' + apiEndpoint + '\n' +
            'OpenAI Key: ' + (openaiApiKey ? '***已设置***' : '未设置') + '\n' +
            'Anthropic Key: ' + (anthropicApiKey ? '***已设置***' : '未设置') + '\n' +
            '转换提示词: ' + (conversionPrompt ? '已填写' : '未填写') + '\n' +
            '审核提示词: ' + (reviewPrompt ? '已填写' : '未填写'));
    }

    async function testApiConnection() {
      const apiEndpoint = document.getElementById('apiEndpoint').value.trim();
      
      if (!apiEndpoint) {
        alert('❌ 请先输入 API 服务地址');
        return;
      }
      
      try {
        const response = await fetch(`${apiEndpoint}/health`);
        if (response.ok) {
          const data = await response.json();
          alert('✅ 连接成功！\n\n' + JSON.stringify(data, null, 2));
        } else {
          alert('❌ 服务返回错误: ' + response.status);
        }
      } catch(e) {
        alert('❌ 连接失败: ' + e.message + '\n\n请检查：\n' +
              '1. API 地址是否正确\n' +
              '2. 后端服务是否已启动\n' +
              '3. 是否有跨域问题');
      }
    }

    function getApiBase() {
      const saved = localStorage.getItem('apiEndpoint') || '';
      return saved.replace(/\/+$/, '');
    }

    function getApiUrl(path) {
      const base = getApiBase();
      return base ? `${base}${path}` : path;
    }

    function isCoverMissing(novel) {
      return !novel.cover || novel.cover === '📖' || novel.cover === '📘' || novel.cover === '📙';
    }

    async function generateMissingCovers() {
      const missingNovels = novelList.filter(isCoverMissing);
      if (!missingNovels.length) {
        alert('所有小说已经有封面，无需生成。');
        return;
      }

      if (!confirm(`检测到 ${missingNovels.length} 本小说缺少封面，是否开始一键生成？`)) {
        return;
      }

      try {
        const response = await fetch(getApiUrl('/api/cover/generate/bulk'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ novel_ids: missingNovels.map(n => n.id) })
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.detail || `HTTP ${response.status}`);
        }

        const result = await response.json();
        if (result.updated && Array.isArray(result.updated)) {
          result.updated.forEach(item => {
            const novel = novelList.find(n => n.id === item.novel_id || n.slug === item.novel_id);
            if (novel) novel.cover = item.cover;
          });
          renderNovelList();
        }

        alert('✅ 已完成缺失封面生成，请查看最新封面。');
      } catch (e) {
        alert('❌ 一键生成失败：' + e.message);
      }
    }

    let selectedCoverNovelId = null;

    function openCoverModal(novelId, event) {
      event.stopPropagation();
      selectedCoverNovelId = decodeURIComponent(novelId);
      const novel = novelList.find(n => n.id === selectedCoverNovelId || n.slug === selectedCoverNovelId);
      if (!novel) return;

      const preview = document.getElementById('coverPreview');
      const previewText = document.getElementById('coverPreviewText');
      const coverUrl = novel.cover && (novel.cover.startsWith('http://') || novel.cover.startsWith('https://') || novel.cover.startsWith('data:image') || novel.cover.startsWith('novels/'))
        ? novel.cover : null;
      preview.innerHTML = coverUrl ? `<img src="${coverUrl}" alt="${novel.title} 封面">` : '<span style="font-size: 2rem;">📖</span>';
      previewText.textContent = `正在编辑：${novel.title}`;
      document.getElementById('coverModal').classList.add('visible');
    }

    function closeCoverModal() {
      selectedCoverNovelId = null;
      document.getElementById('coverModal').classList.remove('visible');
      document.getElementById('coverFileInput').value = '';
    }

    async function uploadCoverFromInput(event) {
      if (!selectedCoverNovelId) return;
      const file = event.target.files[0];
      if (!file) return;
      const formData = new FormData();
      formData.append('novel_id', selectedCoverNovelId);
      formData.append('file', file);

      try {
        const response = await fetch(getApiUrl('/api/cover/upload'), {
          method: 'POST',
          body: formData
        });
        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.detail || `HTTP ${response.status}`);
        }
        const result = await response.json();
        const novel = novelList.find(n => n.id === selectedCoverNovelId || n.slug === selectedCoverNovelId);
        if (novel) {
          novel.cover = result.cover;
          renderNovelList();
        }
        alert('✅ 上传成功，封面已更新。');
        closeCoverModal();
      } catch (e) {
        alert('❌ 上传失败：' + e.message);
      }
    }

    async function generateCoverForNovel() {
      if (!selectedCoverNovelId) return;
      try {
        const response = await fetch(getApiUrl('/api/cover/generate'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ novel_id: selectedCoverNovelId })
        });
        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.detail || `HTTP ${response.status}`);
        }
        const result = await response.json();
        const novel = novelList.find(n => n.id === selectedCoverNovelId || n.slug === selectedCoverNovelId);
        if (novel) {
          novel.cover = result.cover;
          renderNovelList();
        }
        alert('✅ AI 已生成新封面。');
        closeCoverModal();
      } catch (e) {
        alert('❌ 封面生成失败：' + e.message);
      }
    }

    // ========== 页面初始化 ==========
    function initApiConfig() {
      const savedEndpoint = localStorage.getItem('apiEndpoint') || '';
      const savedOpenaiKey = localStorage.getItem('openaiApiKey') || '';
      const savedAnthropicKey = localStorage.getItem('anthropicApiKey') || '';
      const savedConversionPrompt = localStorage.getItem('conversionPrompt') || '';
      const savedReviewPrompt = localStorage.getItem('reviewPrompt') || '';
      
      if (savedEndpoint) {
        document.getElementById('apiEndpoint').value = savedEndpoint;
      }
      if (savedOpenaiKey) {
        document.getElementById('openaiApiKey').value = savedOpenaiKey;
      }
      if (savedAnthropicKey) {
        document.getElementById('anthropicApiKey').value = savedAnthropicKey;
      }
      if (savedConversionPrompt) {
        document.getElementById('conversionPrompt').value = savedConversionPrompt;
      }
      if (savedReviewPrompt) {
        document.getElementById('reviewPrompt').value = savedReviewPrompt;
      }
    }

    // 页面加载完成时运行
    loadNovels();
    initApiConfig();
  </script>
</body>
</html>
